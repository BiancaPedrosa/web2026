<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Dashboard - Gerenciar Músicas</title>
     <!-- Importando o Bootstrap para a tabela ficar com o estilo correto -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
    
    <div class="container py-4">
    <!-- Cabeçalho com Usuário Logado e Botão de Sair -->
     <div class="d-flex justify-content-end align-items-center gap-3 mt-2 mb-4">
         <div id="userInfo" class="alert alert-success mb-0" style="padding: 8px 15px;"></div>
         <button id="btn-logout" class="btn btn-outline-danger">Sair</button>
     </div>
     
     <div class="row">
         <!-- Lado Esquerdo: Formulário para Inserir/Editar Músicas -->
         <div class="col-md-6 mb-4">
             <div class="card shadow-sm p-4">
                 <h4 class="mb-3">Inserir / Gerenciar Músicas</h4>
                 
                 <div class="mb-3">
                     <label class="form-label">ID / Identificador:</label>
                     <input type="text" id="formId" class="form-control" placeholder="Ex: 1 ou m01">
                 </div>
                 
                 <div class="mb-3">
                     <label class="form-label">Título da Música:</label>
                     <input type="text" id="formTitulo" class="form-control" placeholder="Ex: Bohemian Rhapsody">
                 </div>
                 
                 <div class="mb-3">
                     <label class="form-label">Artista:</label>
                     <input type="text" id="formArtista" class="form-control" placeholder="Ex: Queen">
                 </div>
     
                 <!-- Botões de Ação com os IDs exatos que o dashboard.js espera -->
                 <div class="d-flex gap-2 flex-wrap mt-4">
                     <button id="btGravar" class="btn btn-success">Gravar Música</button>
                     <button id="limpar" class="btn btn-secondary">Limpar</button>
                 </div>
             </div>
         </div>
     
         <!-- Lado Direito: Lista de Músicas -->
         <div class="col-md-6">
             <div class="card shadow-sm p-4">
                 <h4 class="mb-3">Músicas Cadastradas</h4>
                 <div class="table-responsive">
                     <table class="table table-striped table-hover mb-0">
                         <thead class="table-dark">
                             <tr>
                                 <th>ID</th>
                                 <th>Título</th>
                                 <th>Artista</th>
                                 <th>Ações</th>
                             </tr>
                         </thead>
                         <!-- O dashboard.js preencherá as músicas neste tbody -->
                         <tbody id="musicaListContainer">
                             <tr><td colspan="4" class="text-center py-3">Carregando músicas...</td></tr>
                         </tbody>
                     </table>
                 </div>
             </div>
         </div>
     </div>
     
     <!-- Certifique-se de importar o dashboard.js no final do body -->
     <script type="module" src="./js/dashboard.js"></script>
    </div>
</body>
</html>
