<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Músicas</title>
    <!-- Importando o Bootstrap para estilização -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">🎵 Catálogo de Músicas</h2>
            <!-- Botão que direciona os administradores para a tela de login -->
            <a href="login.html" class="btn btn-outline-primary">Área Restrita (Login)</a>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID / Identificador</th>
                                <th>Título da Música</th>
                                <th>Artista</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-musicas">
                            <!-- O Javascript irá preencher os dados aqui -->
                            <tr><td colspan="3" class="text-center py-3">Carregando músicas...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./js/index.js"></script>
</body>
</html>
