<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container py-5 d-flex justify-content-center">
        <div class="card shadow-sm p-4 w-100" style="max-width: 400px;">
            <h4 class="mb-4 text-center">Criar uma Conta</h4>
            
            <form id="register-form">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" id="register-email" class="form-control" placeholder="Seu melhor e-mail" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" id="register-password" class="form-control" placeholder="Mínimo de 6 caracteres" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">Cadastrar e Entrar</button>
            </form>

            <!-- Botão do Google -->
            <button id="btn-google" class="btn btn-outline-danger w-100 mb-3">
                Continuar com o Google
            </button>
            
            <div class="text-center mt-3">
                <span class="text-muted">Já tem uma conta?</span> <a href="login.html" class="text-decoration-none">Faça login</a>
            </div>
        </div>
    </div>

    <!-- Importando a lógica de autenticação -->
    <script type="module" src="./js/firebase-auth.js"></script>
</body>
</html>
